; ac-re DLSS for VR — configuration
; Place this file next to acs.exe (the Assetto Corsa folder), alongside dxgi.dll.
; HOT-RELOAD: saving this file applies changes live within ~1 second, in-game.
;   Live keys: mode off<->dlaa, preset, jitter*, sharpness, reactive_mask, mask_scale,
;              auto_exposure (preset/auto_exposure briefly hitch: DLSS features recreate).
;   Restart-bound: switching dlaa<->dlss, the upscale ratio and render_scale (render
;   target sizes are fixed at track load) — restart the SESSION for those.

[acre]

; mode: which reconstruction to run
;   off   - proxy loads but does nothing
;   dlaa  - DLSS anti-aliasing at native resolution (best quality, no perf gain)
;   dlss  - DLSS upscaling (renders lower, reconstructs to native = performance gain)
mode = dlaa

; DLSS render preset (image-quality model). K/L = transformer, newest/best.
;   L = transformer, sharper (recommended)   K = transformer, softer
;   J = transformer, older                   M = transformer, performance-tuned
;   A..F = older CNN presets
preset = L

; --- dlss (upscaling) mode only ---
; upscale: how aggressively to reconstruct. The plugin lowers the render resolution
; INTERNALLY (by intercepting the VR runtime's recommended-size query), so you do NOT
; touch any SteamVR / OpenComposite / Oculus setting — just pick a preset here. CSP
; renders at the reduced size (the performance gain) and DLSS reconstructs to native.
;   quality      -> renders at ~67% linear, reconstructs to native  (best image)
;   balanced     -> renders at ~58% linear
;   performance  -> renders at ~50% linear                          (most fps)
upscale = quality

; --- dlaa mode only ---
; render_scale: supersampling. The plugin raises the render resolution INTERNALLY (same
; recommended-size interception used by dlss mode, in reverse), so CSP renders the scene
; larger, DLAA runs at that larger size, and the VR compositor downsamples to your panel.
; Real extra rendered pixels, so it is the biggest available quality step — and the most
; expensive: cost is QUADRATIC. 1.2 = 1.44x the pixels, 1.4 = ~2x, 2.0 = 4x.
; Start at 1.2 and watch for reprojection. 1.0 = off (native). Range 1.0-2.0.
; If you already supersample in SteamVR / Oculus / Virtual Desktop, that MULTIPLIES with
; this — turn one of them down, or you will silently ask for far more pixels than intended.
; Needs a SESSION RESTART to take effect (render targets are sized at track load).
render_scale = 1.0

; output_width / output_height: OPTIONAL. Force an absolute per-eye upscale target in
; pixels. Leave at 0 to use the native size the plugin detects automatically (normal).
; Only set these if the auto-detected native looks wrong for your headset.
output_width = 0
output_height = 0

; --- quality tuning (usually leave as-is) ---
; jitter: sub-pixel jitter for maximum detail reconstruction. 1 = on.
jitter = 1
; jitter_scale: sub-pixel jitter amplitude, 0..1 (hot-reload). 1.0 = full +-0.5px Halton.
; Lower shrinks how far high-contrast grazing-surface edges (rubber lines, white-line/grass
; edges) move each frame -- the trigger for the road-surface crawl DLSS can't stably resolve.
; 0.1 kills that crawl with no visible loss of detail in VR; 0 = jitter fully off.
jitter_scale = 0.1
; jitter_flip_x/y: sign convention of the jitter reported to DLSS. Wrong signs show as
; visible shake + blur + flickering lights. Calibrated empirically (temporal-stability
; sweep on the null driver, 2026-07-18): Y must be flipped (NDC y-up vs pixel y-down).
jitter_flip_x = 0
jitter_flip_y = 1
; reactive_mask: tells DLSS which pixels to trust less, so it stops over-smoothing
; the image. Applies to BOTH dlaa and dlss. Leave at 1 -- turning it off brings
; back the soft, shimmery look. 1 = on.
reactive_mask = 1
; mask_scale: reactive sensitivity (higher = more of the frame treated as HUD/motion).
mask_scale = 1.0
; auto_exposure: let DLSS estimate exposure. 0 = off (steadier on dark high-contrast edges).
auto_exposure = 0
; sharpness: CAS-style adaptive sharpen applied right after DLSS (DLSS 2.5.1+ removed its
; built-in sharpener). 0 = off, 0.3-0.6 recommended (0.6 default). Use ONLY ONE sharpener in
; the chain — disable Virtual Desktop / CSP CAS sharpening if you enable this (else halos).
sharpness = 0.6

; ldr: run DLAA on the final tonemapped image instead of the HDR scene, which is how
; CSP does it on the flat-screen path. This is the validated-good path in VR (the HDR
; in-place path looks far worse); 1 = on.
ldr = 1

; sps_mv: only affects Single Pass Stereo. 1 = reproject motion vectors using the true
; per-eye projection (best quality if correct). 0 = zero the motion vectors (safe fallback:
; both eyes stay fused, only fast-moving content smears a little). Set 0 if the eyes look
; skewed/diverged under SPS. No effect when SPS is off.
sps_mv = 1
